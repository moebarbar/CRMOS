# Railway service config for the Next.js web app.
# This file MUST live at the repo root and the Railway service's
# Root Directory MUST be "/" — pnpm monorepos can't build from a
# subdirectory because the lockfile is at the workspace root.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
healthcheckPath = "/"
healthcheckTimeout = 60

# Watch the whole repo for changes — without this Railway may filter
# changes to root-level files (lockfile, package.json) and skip deploys.
[build.watchPatterns]
include = ["**"]
